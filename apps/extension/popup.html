<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <style>
        body {
            width: 400px;
            min-height: 200px;
            font-family: system-ui, sans-serif;
            padding: 12px;
            margin: 0;
        }

        h1 {
            font-size: 16px;
            margin: 0 0 8px;
        }

        #output {
            width: 100%;
            height: 240px;
            font-family: monospace;
            font-size: 12px;
            resize: vertical;
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        button {
            padding: 6px 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #0969da;
            color: #fff;
            font-size: 13px;
        }

        button:hover {
            background: #0550ae;
        }

        #status {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
        }

        fieldset {
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        legend {
            font-size: 13px;
            font-weight: 600;
        }

        label {
            display: block;
            font-size: 12px;
            margin: 4px 0;
        }

        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 3px 6px;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <h1>HTML → Markdown</h1>

    <fieldset>
        <legend>Options</legend>
        <label>
            <input type="checkbox" id="optGfm" checked /> GFM Tables &amp; Strikethrough
        </label>
        <label>
            Remove selectors:
            <input type="text" id="optRemove" placeholder=".ads, footer, nav" />
        </label>
    </fieldset>

    <div class="actions">
        <button id="convertBtn">Convert Page</button>
        <button id="copyBtn" disabled>Copy</button>
        <button id="downloadBtn" disabled>Download .md</button>
    </div>
    <p id="status"></p>
    <textarea id="output" readonly></textarea>

    <script type="module" src="./src/popup.js"></script>
</body>

</html>
